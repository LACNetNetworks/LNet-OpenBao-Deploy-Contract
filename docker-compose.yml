services:
  bao:
    build:
      context: .
      dockerfile: docker/Dockerfile.bao
    container_name: lacchain-bao
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    # Modo dev con auto-registro de los plugins del directorio
    command: server -dev -dev-plugin-dir=/openbao/plugins
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 3s
      timeout: 3s
      retries: 20
